<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timestamp Otomatis - Tekan SPASI</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            max-width: 800px; 
            margin: 0 auto; 
            background: #1a202c;
            color: #e2e8f0;
        }
        .controls { 
            margin: 20px 0; 
            padding: 30px; 
            background: #2d3748; 
            border-radius: 10px;
            text-align: center;
        }
        button { 
            padding: 15px 30px; 
            margin: 10px; 
            font-size: 18px; 
            cursor: pointer;
            border: none;
            border-radius: 8px;
        }
        .record-btn { 
            background: #4fd1c5; 
            color: #1a202c;
            font-weight: bold;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .timestamp-list { 
            margin-top: 20px; 
            max-height: 400px; 
            overflow-y: auto;
        }
        .timestamp-item { 
            padding: 12px; 
            margin: 8px 0; 
            background: #4a5568; 
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #currentTime { 
            font-size: 48px; 
            font-weight: bold; 
            color: #4fd1c5;
            font-family: monospace;
        }
        .hint {
            background: #ecc94b;
            color: #1a202c;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">🎵 Timestamp Otomatis - Surah 78</h1>
    
    <div class="hint">
        ⌨️ Tekan SPASI setiap kali ayat baru dimulai!
    </div>
    
    <div class="controls">
        <audio id="audio" style="width: 100%; margin: 20px 0;"></audio>
        
        <div style="margin: 20px 0;">
            <strong>Waktu Saat Ini:</strong><br>
            <span id="currentTime">00:00</span>
        </div>

        <div>
            <button onclick="playPause()" id="playPauseBtn">▶ Play</button>
            <button onclick="recordTimestamp()" class="record-btn">📍 CATAT (SPASI)</button>
            <button onclick="resetTimestamps()" style="background: #f56565; color: white;">🔄 Reset</button>
        </div>
        <div style="margin-top: 15px;">
            <strong>Total Ayat Tercatat:</strong> <span id="countAyat">0</span>
        </div>
    </div>

    <div class="timestamp-list">
        <h3>📝 Timestamp yang Tercatat:</h3>
        <div id="timestamps"></div>
    </div>

    <div style="margin-top: 20px; text-align: center;">
        <button onclick="exportJSON()" style="background: #48bb78; color: white; padding: 20px 40px; font-size: 18px;">💾 Download JSON</button>
    </div>

    <script>
        const audio = document.getElementById('audio');
        const timestamps = [];
        let isPlaying = false;
        
        audio.src = 'audio/78-1.m4a';

        function formatTime(seconds) {
            if (isNaN(seconds)) return '00:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return mins.toString().padStart(2, '0') + ':' + secs.toString().padStart(2, '0');
        }

        function playPause() {
            if (isPlaying) {
                audio.pause();
                document.getElementById('playPauseBtn').innerHTML = '▶ Play';
            } else {
                audio.play();
                document.getElementById('playPauseBtn').innerHTML = '⏸ Pause';
            }
            isPlaying = !isPlaying;
        }

        function recordTimestamp() {
            const currentTime = audio.currentTime;
            const ayatNumber = timestamps.length + 1;
            
            timestamps.push({
                ayat: ayatNumber,
                timestamp: currentTime,
                formatted: formatTime(currentTime)
            });

            renderTimestamps();
            updateCount();
            
            const btn = document.querySelector('.record-btn');
            btn.style.transform = 'scale(0.95)';
            setTimeout(function() { btn.style.transform = 'scale(1)'; }, 100);
            
            console.log('✅ Ayat ' + ayatNumber + ': ' + formatTime(currentTime));
        }

        function renderTimestamps() {
            const container = document.getElementById('timestamps');
            let html = '';
            for (let i = 0; i < timestamps.length; i++) {
                const ts = timestamps[i];
                html += '<div class="timestamp-item"><span><strong>Ayat ' + ts.ayat + ':</strong> ' + ts.formatted + ' (' + ts.timestamp.toFixed(3) + 's)</span><button onclick="deleteTimestamp(' + i + ')" style="padding: 5px 10px; background: #f56565; color: white; border: none; border-radius: 5px; cursor: pointer;">🗑</button></div>';
            }
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        function deleteTimestamp(index) {
            if (confirm('Hapus timestamp ayat ' + (index + 1) + '?')) {
                timestamps.splice(index, 1);
                for (let i = 0; i < timestamps.length; i++) {
                    timestamps[i].ayat = i + 1;
                }
                renderTimestamps();
                updateCount();
            }
        }

        function updateCount() {
            document.getElementById('countAyat').textContent = timestamps.length;
        }

        function resetTimestamps() {
            if (confirm('Hapus semua timestamp?')) {
                timestamps.length = 0;
                audio.pause();  // ← Stop audio
                audio.currentTime = 0;  // ← Reset waktu ke 0
                isPlaying = false;  // ← Reset status play
                document.getElementById('playPauseBtn').innerHTML = '▶ Play';  // ← Update tombol
                renderTimestamps();
                updateCount();
                document.getElementById('currentTime').textContent = '00:00';  // ← Update tampilan waktu
            }
        }

        function exportJSON() {
            const data = {
                surahId: 78,
                surahName: "An-Naba'",
                totalAyat: timestamps.length,
                audioDuration: audio.duration,
                timestamps: timestamps.map(ts => ({
                    ayat: ts.ayat,
                    time: parseFloat(ts.timestamp.toFixed(3))
                }))
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'timestamp-78.json';
            a.click();
            URL.revokeObjectURL(url);

            console.log('📥 JSON exported:', data);
            alert('JSON berhasil diunduh! Simpan ke: data.2/timestamp-78.json');
        }

        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
                e.preventDefault();
                recordTimestamp();
            }
            if (e.code === 'Space') {
                e.preventDefault();
                playPause();
            }
        });

        audio.addEventListener('timeupdate', function() {
            document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
        });

        audio.addEventListener('loadedmetadata', function() {
            document.getElementById('duration').textContent = formatTime(audio.duration);
        });
    </script>
</body>
</html>
